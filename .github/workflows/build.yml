name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── macOS Desktop (Electron DMG) ───────────────────────────────────
  build-mac:
    runs-on: macos-14
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Build Vite
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - name: Build Electron DMG
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false   # Skip code signing for now

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CareWatch-mac
          path: frontend/dist-electron/*.dmg

  # ── iOS (Capacitor + Xcode Cloud or manual) ────────────────────────
  # Uncomment when you have Apple Developer account
  # build-ios:
  #   runs-on: macos-14
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Build iOS
  #       run: |
  #         cd frontend
  #         npm ci && npm run build
  #         npx cap sync ios
  #         xcodebuild archive -workspace ios/App/App.xcworkspace ...

  # ── Release ───────────────────────────────────────────────────────
  release:
    needs: build-mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CareWatch-mac/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
