<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elio Montes Chavez — Telio Driver</title>

  <!-- Smart App Banner: shows "OPEN" if app installed, "GET" if not -->
  <meta name="apple-itunes-app" content="app-id=6756498916, app-argument=https://telio.app/emontes.02">

  <!-- Open Graph tags for link previews -->
  <meta property="og:title" content="Elio Montes Chavez — Telio Driver">
  <meta property="og:description" content="Add me as your driver on Telio">
  <meta property="og:image" content="https://telio.app/Telio-Web.png">
  <meta property="og:url" content="https://telio.app/emontes.02">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #1a1a1a;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 380px;
      width: 100%;
    }
    .header {
      background: #FFD700;
      border-radius: 16px 16px 0 0;
      padding: 24px;
      text-align: left;
    }
    .header h1 { font-size: 24px; font-weight: 700; }
    .header p { font-size: 14px; color: #333; margin-top: 4px; }
    .body {
      padding: 24px;
      border: 1px solid #e5e5e5;
      border-top: none;
      border-radius: 0 0 16px 16px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #1a1a1a;
      color: #fff;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #1a1a1a;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 13px; color: #888; margin-top: 8px; }
    #status-text { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Elio Montes Chavez</h1>
      <p>@emontes.02 &bull; NV9812</p>
    </div>
    <div class="body">
      <a id="open-app" class="btn btn-primary" href="#">
        Open in Telio App
      </a>
      <a class="btn btn-secondary" href="https://apps.apple.com/us/app/telio-rider/id6756498916">
        Download on the App Store
      </a>
      <a class="btn btn-secondary" href="https://play.google.com/store/apps/details?id=app.telio.mobile.teliorider">
        Get it on Google Play
      </a>
      <p id="status-text" class="status">
        <span class="spinner"></span> Opening app...
      </p>
    </div>
  </div>

  <script>
    (function() {
      var profileUrl = 'https://telio.app/emontes.02';
      var appStoreUrl = 'https://apps.apple.com/us/app/telio-rider/id6756498916';
      var playStoreUrl = 'https://play.google.com/store/apps/details?id=app.telio.mobile.teliorider';

      var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      var isAndroid = /Android/i.test(navigator.userAgent);

      var openAppBtn = document.getElementById('open-app');
      var statusText = document.getElementById('status-text');

      openAppBtn.addEventListener('click', function(e) {
        e.preventDefault();
        statusText.style.display = 'block';

        // Try to open via Universal Link (works if Telio configures AASA for profiles)
        window.location.href = profileUrl;

        // Fallback: if the app didn't open after 2s, go to the store
        var fallbackTimeout = setTimeout(function() {
          if (isIOS) {
            window.location.href = appStoreUrl;
          } else if (isAndroid) {
            window.location.href = playStoreUrl;
          }
        }, 2000);

        // If the page becomes hidden (app opened), cancel the fallback
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) {
            clearTimeout(fallbackTimeout);
          }
        });
      });

      // Auto-attempt on mobile: try to open the app immediately
      if (isIOS || isAndroid) {
        statusText.style.display = 'block';
        window.location.href = profileUrl;

        setTimeout(function() {
          statusText.style.display = 'none';
          // Don't auto-redirect to store — let user choose
        }, 2500);
      }
    })();
  </script>
</body>
</html>
